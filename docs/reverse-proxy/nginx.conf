# nginx + Let's Encrypt. Replace mongo.example.com with your domain.
# Run certbot --nginx -d mongo.example.com after the HTTP block is live.

server {
    listen 80;
    server_name mongo.example.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name mongo.example.com;

    ssl_certificate     /etc/letsencrypt/live/mongo.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mongo.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "interest-cohort=(), browsing-topics=()" always;

    # Optional: allowlist source IPs.
    # allow 203.0.113.0/24;
    # allow 100.64.0.0/10;
    # deny  all;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }
}

# In .env, set:  TRUST_PROXY=1
